<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

</head>

<body>
    <header class="base-header">
        <div class="header-container">
            <h1 id="base-h1"><a href="{% url 'home' %}">Apuntes</a></h1>
            <div class="base-nav">
                <div class="nav-izq">
                    <a href="{% url 'gestion_carreras:lista_carreras' %}" class="dropdown-toggle {% if request.resolver_match.url_name == 'lista_carreras' %}active{% endif %}">Carreras</a>
                </div>
                <div class="nav-der">
                    {% if user.is_authenticated %}
                        <div class="dropdown">
                            <button class="btn dropdown-toggle" type="button" id="userMenuDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
                                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                                </svg>
                                {{ user.username }}
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuDropdown">
                                <li><a class="dropdown-item" href="{% url 'gestion_usuarios:perfil' %}">Mi Perfil</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form id="logout-form" action="{% url 'gestion_usuarios:logout' %}" method="post" style="display: none;">
                                        {% csrf_token %}
                                    </form>
                                    <a class="dropdown-item" href="#" onclick="document.getElementById('logout-form').submit(); return false;">
                                        Cerrar Sesión
                                    </a>
                                </li>
                            </ul>
                        </div>
                    {% else %}
                        <a href="{% url 'gestion_usuarios:login' %}" class="btn">Iniciar Sesión</a>
                        <a href="{% url 'gestion_usuarios:register' %}" class="btn btn-primary">Registrarse</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </header>

    <main class="base-main">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="base-footer">
        <p>© 2025 Apuntes Universitarios</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% block otros_js %}{% endblock %}
</body>
</html>
