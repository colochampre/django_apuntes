{% extends 'base.html' %}

{% block title %}Subir Nuevo Apunte{% endblock %}

{% block content %}
    <h1>Subir Nuevo Apunte</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Subir Apunte</button>
    </form>
    <a href="javascript:history.back()">Cancelar</a>
{% endblock %}
